<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Underground Gallery · Request Access</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #05060a; overflow: hidden; min-height: 100vh; }
  * { box-sizing: border-box; }
  @keyframes aiBlink { 50% { opacity: 0; } }
  @keyframes aiPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  @keyframes aiSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#05060a">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#05060a"/>
    <path d="M300 200 H900 M300 400 H900 M300 600 H700" stroke="#ff2a2a" stroke-width="22" fill="none" stroke-linecap="square"/>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="screens-entry.jsx"></script>
<script type="text/babel" src="screens-unlock.jsx"></script>
<script type="text/babel" src="request-flow.jsx"></script>

<script type="text/babel">
const TWEAKS = { accent: 'red', texture: 'carbon', invitedBy: 'R_APEX', statusProminence: 'gamified' };

function App() {
  const accent = ACCENTS[TWEAKS.accent];
  const [step, setStep] = React.useState(0);
  const STEPS = [RAStepIdentity, RAStepPhotos, RAStepMods, RAStepVerify, RAStepSubmitted];
  const TITLES = ['IDENTITY', 'BUILD PHOTOS', 'MOD LIST', 'VERIFY', 'REVIEW'];
  const [data, setData] = React.useState({
    socials: { ig: '', tt: '', fb: '' },
    photos: { exterior: false, interior: false, engine: false },
    mods: [
      { sec: 'POWERTRAIN', name: '', shop: '' },
      { sec: 'CHASSIS',    name: '', shop: '' },
      { sec: 'EXTERIOR',   name: '', shop: '' },
    ],
  });
  const Current = STEPS[step];

  return (
    <div style={{
      minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'radial-gradient(ellipse at 50% 30%, #0a0b10, #05060a 70%)',
      padding: 24, gap: 28,
    }}>
      <div style={{ filter: 'drop-shadow(0 40px 60px rgba(255,42,42,0.12))' }}>
        <IOSDevice dark>
          <div key={step} style={{ width: '100%', height: '100%', overflow: 'auto', animation: 'aiSlideIn 0.35s ease-out' }} className="no-scrollbar">
          <ScreenShell tweaks={TWEAKS} accent={accent}>
            <TopBar accent={accent} onBack={() => {
              if (step === 0) window.location.href = 'invite.html';
              else setStep(step - 1);
            }} step={`REQUEST · ${String(step + 1).padStart(2, '0')} / ${String(STEPS.length).padStart(2, '0')}`}/>

            {/* Step bar */}
            <div style={{ padding: '8px 24px 0', display: 'flex', gap: 4 }}>
              {STEPS.map((_, i) => (
                <div key={i} style={{ flex: 1, height: 2, background: i <= step ? accent.primary : 'rgba(255,255,255,0.1)' }}/>
              ))}
            </div>

            <div style={{ padding: '18px 24px 0' }}>
              <Mono size={10} color={accent.primary}>∕∕ {TITLES[step]}</Mono>
            </div>

            <Current accent={accent} data={data} setData={setData}/>

            <div style={{ flex: 1 }}/>

            <CTAButton
              accent={accent}
              onClick={() => {
                if (step === STEPS.length - 1) window.location.href = 'invite.html';
                else setStep(step + 1);
              }}
              label={step === STEPS.length - 1 ? 'EXIT' : (step === 3 ? 'SUBMIT FOR REVIEW' : (step === 2 ? 'CONTINUE TO VERIFY' : 'CONTINUE'))}
              sub={step === STEPS.length - 1 ? '' : `→ ${TITLES[Math.min(step + 1, STEPS.length - 1)]}`}
              disabled={step === 3 && data.verify?.phase !== 'verified'}
            />
          </ScreenShell>
          </div>
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
